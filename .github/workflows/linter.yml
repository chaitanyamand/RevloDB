name: Super-Linter

on:
  issue_comment:
    types: [created]

jobs:
  super-lint:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, ':runLintChecks') &&
      (
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.author_association == 'OWNER'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/scripts

      - name: Backup scripts
        run: cp -r .github/scripts ${{ runner.temp }}/scripts

      - name: Get PR Head SHA
        id: pr_info
        uses: actions/github-script@v7
        env:
          RUN_ID: ${{ github.run_id }}
          CONTEXT_NAME: 'Super-Linter'
          DESCRIPTION: 'Linter has started'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const script = require(`${process.env.RUNNER_TEMP}/scripts/get_pr_sha_and_set_pending.js`);
            await script({github, context, core});

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr_info.outputs.sha }}
          fetch-depth: 0

      - name: Run Super-Linter
        uses: github/super-linter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: main
          GITHUB_SHA: ${{ steps.pr_info.outputs.sha }}

      - name: Report Status
        if: always()
        uses: actions/github-script@v7
        env:
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ steps.pr_info.outputs.sha }}
          JOB_STATUS: ${{ job.status }}
          CONTEXT_NAME: 'Super-Linter'
          DESCRIPTION_PREFIX: 'Linter completed with status'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const script = require(`${process.env.RUNNER_TEMP}/scripts/report_status.js`);
            await script({github, context});
