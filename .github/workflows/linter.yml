name: Super-Linter
 
on:
  issue_comment:
    types: [created]
 
permissions:
  contents: read
  statuses: write
 
jobs:
  super-lint:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, ':runLintChecks') &&
      (
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.author_association == 'OWNER'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Get PR Head SHA
        id: pr_info
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const ci = require('.github/scripts/ciStatus.js');
            const functions = await ci({ github, context, core }, 'Super-Linter', 'Linter has started', 'Linter completed with status');
            await functions.getPRHeadSHAWithStatus();
 
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr_info.outputs.sha }}
          fetch-depth: 0
 
      - name: Run Super-Linter
        uses: github/super-linter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: main
          GITHUB_SHA: ${{ steps.pr_info.outputs.sha }}
 
      - name: Report Status
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const ci = require('.github/scripts/ciStatus.js');
            const functions = await ci({ github, context, core }, 'Super-Linter', 'Linter has started', 'Linter completed with status');
            await functions.reportStatus('${{ steps.pr_info.outputs.sha }}', '${{ job.status }}');