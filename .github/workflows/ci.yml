name: RevloDB API Integration Tests

on:
  issue_comment:
    types: [created]

jobs:
  build-and-test:
    permissions:
      contents: read
      statuses: write
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, ':runTests') &&
      (
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.author_association == 'OWNER'
      )
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api.tests
    steps:
      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: .github/scripts

      - name: Backup scripts
        run: cp -r .github/scripts ${{ runner.temp }}/scripts
        working-directory: ${{ runner.temp }} 

      - name: Get PR Head SHA
        id: pr_info
        uses: actions/github-script@v7
        env:
          RUN_ID: ${{ github.run_id }}
          CONTEXT_NAME: 'RevloDB API Integration Tests'
          DESCRIPTION: 'Tests are running...'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const script = require(`${process.env.RUNNER_TEMP}/scripts/get_pr_sha_and_set_pending.js`);
            await script({github, context, core});

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr_info.outputs.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.405

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Report Status
        if: always()
        uses: actions/github-script@v7
        env:
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ steps.pr_info.outputs.sha }}
          JOB_STATUS: ${{ job.status }}
          CONTEXT_NAME: 'RevloDB API Integration Tests'
          DESCRIPTION_PREFIX: 'Tests completed with status'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const script = require(`${process.env.RUNNER_TEMP}/scripts/report_status.js`);
            await script({github, context});
