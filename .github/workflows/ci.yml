name: RevloDB API Integration Tests
 
on:
  issue_comment:
    types: [created]
 
permissions:
  contents: read
  statuses: write
 
jobs:
  build-and-test:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, ':runTests') &&
      (
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.author_association == 'OWNER'
      )
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api.tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Get PR Head SHA
        id: pr_info
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const ci = require('.github/scripts/ciStatus.js');
            const functions = await ci({ github, context, core }, 'RevloDB API Integration Tests', 'Tests are running...', 'Tests completed with status');
            await functions.getPRHeadSHAWithStatus();
 
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr_info.outputs.sha }}
 
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
 
      - name: Restore dependencies
        run: dotnet restore
 
      - name: Build
        run: dotnet build --configuration Release --no-restore
 
      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal
 
      - name: Report Status
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const ci = require('.github/scripts/ciStatus.js');
            const functions = await ci({ github, context, core }, 'RevloDB API Integration Tests', 'Tests are running...', 'Tests completed with status');
            await functions.reportStatus('${{ steps.pr_info.outputs.sha }}', '${{ job.status }}');